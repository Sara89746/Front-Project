<!DOCTYPE html>
<html lang="en" data-theme="dark"
data-theme="light">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <script src="themes.js "></script>
    <link rel="stylesheet" href="style.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        [data-theme="dark"] {
            --bg: #191932;
            --bg-alt: #0d1124;
            --text: #ffffff;
            --text-muted: rgba(255,255,255,0.58);
            --text-faint: rgba(255,255,255,0.32);
            --glass: rgba(255,255,255,0.06);
            --glass-border: rgba(255,255,255,0.12);
            --nav-bg: rgba(10,10,26,0.80);
            --card-bg: rgba(48, 46, 46, 0.05);
            --card-shadow: rgba(0,0,0,0.4);
        }
        [data-theme="light"] {
  --bg:           #f4f6ff;
  --bg-card:      #ffffff;
  --border:       rgba(79,70,229,0.15);
  --text:         #0d1124;
  --text-muted:   rgba(13,17,36,0.55);
  --input-bg:     #f9fafe;
  --glass:        rgba(255,255,255,0.85);
  --card-shadow:  rgba(79,70,229,0.12);
}
        :root {
            --gold: #f5c842;
            --gold2: #e8a500;
            --violet: #4f46e5;
            --violet2: #7c3aed;
            --sky: #38bdf8;
            --red: #ef4444;
            --green: #22c55e;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--bg) 0%, var(--bg-alt) 50%, var(--bg) 100%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px;
            overflow-x: hidden;
            position: relative;
        }
        .register-container {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 60px;
            width: 100%;
            max-width: 550px;
            position: relative;
            box-shadow: 0 40px 100px var(--card-shadow);
            overflow: hidden; 

    }
        .register-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 9px;
            background: linear-gradient(90deg, var(--gold), var(--violet), var(--sky), var(--gold2));
            background-size: 300% 100%;
            animation: gradientShift 4s  infinite;
            
        }
        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .content {
            position: relative;
            z-index: 5;
        }

        .logo {
            text-align: center;
            margin-bottom: 40px;
        }
        .logo h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--gold), #ffe87a , var(--sky));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientText 3s  infinite;
            margin-bottom: 12px;
            letter-spacing: -2px;
        }
        @keyframes gradientText {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .logo p {
            color: var(--text-muted);
            font-size: 1.2rem;
            font-weight: 300;
        }

        form {
            position: relative;
            padding: 20px;
            background: radial-gradient(circle at center, rgba(90, 81, 255, 0.05) 0%, transparent 70%);
        }

        .form-group {
            margin-bottom: 28px;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 12px;
            font-weight: 600;
            color: var(--text);
            font-size: 1rem;
            transition: 0.3s ;
        }

        .form-group input {
            width: 100%;
            padding: 16px 18px;
            background: rgba(255,255,255,0.04);
            border: 2px solid rgba(255,255,255,0.08);
            border-radius: 15px;
            color: var(--text);
            transition:  0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            backdrop-filter: blur(20px);
            position: relative;
        }

        .form-group input::placeholder {
            color: var(--text-faint);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--violet);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.15),0 8px 32px rgba(79, 70, 229, 0.1);
            background: rgba(255,255,255,0.12);
            transform: translateY(-2px);
        }

        .register-A {
            width: 100%;
            padding: 22px;
            background: linear-gradient(135deg, var(--gold), var(--gold2));
            color: #1a1a2e;
            border: none;
            border-radius: 20px;
            font-size: 1.15rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            margin-bottom: 32px;
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .register-A::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        .register-A:hover::before {
            left: 100%;
        }

        .register-A:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 
                0 25px 50px rgba(245, 200, 66, 0.4),
                0 0 0 8px rgba(245, 200, 66, 0.15);
        }

        .register-A:active {
            transform: translateY(-2px) scale(1);
        }

        .divider {
            text-align: center;
            margin: 40px 0;
            position: relative;
            color: var(--text-faint);
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--glass-border), transparent);
        }

        .divider span {
            background: var(--bg);
            padding: 0 32px;
            font-weight: 500;
        }

        .social-login {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
        }

        .social-btn {
            flex: 1;
            padding: 18px 24px;
            border: 2px solid var(--glass-border);
            background: rgba(255,255,255,0.02);
            border-radius: 20px;
            color: var(--text);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            font-weight: 600;
            backdrop-filter: blur(20px);
            position: relative;
            overflow: hidden;
        }

        .social-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(45deg, var(--violet), var(--sky));
            opacity: 0;
            transition: opacity 0.3s ;
        }

        .social-btn:hover::before {
            opacity: 0.1;
        }

        .social-btn:hover {
            border-color: var(--violet);
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(79, 70, 229, 0.2);
        }

        .login-link {
            text-align: center;
        }

        .login-link a {
            color: var(--violet);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            position: relative;
        }

        .login-link a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -4px;
            left: 50%;
            background: var(--violet);
            transition: all 0.3s ease;
        }

        .login-link a:hover::after {
            width: 100%;
            left: 0;
        }

        .login-link a:hover {
            color: var(--violet2);
        }
        
        @media (max-width: 480px) {
            body {
                padding: 10px;
            }
            .register-container {
                padding: 40px 32px;
                margin: 10px;
                border-radius: 24px;
            }
            
            .logo h1 {
                font-size: 2.2rem;
            }
            
            .social-login {
                flex-direction: column;
            }
        }

        
        .form-group {
            opacity: 0;
            transform: translateY(30px);
            animation: staggerIn 0.6s ease forwards;
        }

        .form-group:nth-child(1) { animation-delay: 0.1s; }
        .form-group:nth-child(2) { animation-delay: 0.2s; }
        .form-group:nth-child(3) { animation-delay: 0.3s; }
        .form-group:nth-child(4) { animation-delay: 0.4s; }
        .form-group:nth-child(5) { animation-delay: 0.5s; }

        @keyframes staggerIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body >
    <nav id="navbar">
        <div class="nav-left">
        <div class="logo"><i class="fas fa-graduation-cap"></i> LearnVerse</div>
        </div>
        <ul class="nav-links" id="navLinks">
            <li><a href="index.html" >Home</a></li>
            <li><a href="courses.html">Courses</a></li>
            <li><a href="Artificial_Intelligence.html">Course-details</a></li>
            <li><a href="about.html" >About</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="search.html">Search</a></li>
            <li><a href="profile.html">Profile</a></li>
             <li><a href="register.html"  class="active">Register</a></li>
        </ul>
        <div class="nav-right">
            <a href="Log-in.html" class="btn-nav-login"><i class="fas fa-sign-in-alt"></i> Login</a>
        </div>
</nav>
    <div class="register-container">
        <div class="floating-shapes">
        </div>
        
        <div class="content">
            <div class="logo">
                <h1>Create Account</h1>
                <p>Join LearnVerse to start your learning journey</p>
            </div>

            <form>
           
                <div class="form-group">
                    <label> Full Name</label>
                    <input type="text" placeholder="Enter your full name">
                </div>

                <div class="form-group">
                    <label> Email Address</label>
                    <input type="email" placeholder="your@email.com">
                </div>

                <div class="form-group">
                    <label> Phone Number</label>
                    <input type="tel"  placeholder="+20 123-456-7890">
                </div>

                <div class="form-group">
                    <label> Password</label>
                    <input type="password" id="password" placeholder="Create strong password">
                </div>

                <div class="form-group">
                    <label> Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="Confirm your password">
                </div>

                <div id="error-message" style="color: #ef4444; background: rgba(239, 68, 68, 0.1); padding: 10px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; display: none; text-align: center;"></div>

                <button type="submit" class="register-A" id="registerBtn">
                Create Account
                </button>
            </form>

            <div class="divider">
                <span>or continue with</span>
            </div>

            <div class="social-login">
                <button class="social-btn">
                   Continue with Google
                </button>
                <button class="social-btn">
                   Continue with Phone
                </button>
            </div>

            <div class="login-link">
                Already have an account? <a href="Log-in.html">Sign in here</a>
            </div>
        </div>
    </div>
</body>
</html>
<script>
   
    const form = document.querySelector('form');
    const errorDiv = document.getElementById('error-message');

    form.addEventListener('submit', function(event) {

        event.preventDefault(); 

       
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        errorDiv.style.display = 'none';
        errorDiv.innerHTML = '';

    

        if (password.length < 8) {
            showError('Password must be at least 8 characters long.');
            return;
        }

        if (password !== confirmPassword) {
            showError(' Passwords do not match!');
            return;
        }

     
        alert(' Registration Successful! Welcome to LearnVerse.');
        
        
    });

    function showError(message) {
        errorDiv.innerHTML = message;
        errorDiv.style.display = 'block';
    }
</script>
